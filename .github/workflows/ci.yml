name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20  # Need git history for changes/diff-shape

      - name: Install babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Verify deps
        run: |
          bb --version
          rg --version

      - name: Load test — all modules parse
        run: bb spai.clj help

      # --- Code analysis commands ---

      - name: shape
        run: bb spai.clj shape src/

      - name: usages
        run: bb spai.clj usages grepf src/

      - name: def
        run: bb spai.clj def shape-raw src/

      - name: sig
        run: bb spai.clj sig src/core.clj

      - name: who
        run: bb spai.clj who src/core.clj src/

      - name: context
        run: bb spai.clj context grepf src/

      - name: grep
        run: bb spai.clj grep 'defn-?\s' src/

      - name: patterns
        run: bb spai.clj patterns src/

      # --- Project analysis commands ---

      - name: overview
        run: bb spai.clj overview .

      - name: layout
        run: bb spai.clj layout src/

      - name: hotspots
        run: bb spai.clj hotspots src/

      - name: todos
        run: bb spai.clj todos src/

      # --- Git commands ---

      - name: changes
        run: bb spai.clj changes src/ 3

      - name: diff-shape
        run: bb spai.clj diff-shape src/ HEAD~1

      - name: diff
        run: bb spai.clj diff src/core.clj 2

      # --- Structural editing ---

      - name: spai-edit forms
        run: bb spai-edit.clj forms src/core.clj

      - name: spai-edit validate
        run: bb spai-edit.clj validate src/core.clj

      - name: spai-edit validate spai.clj
        run: bb spai-edit.clj validate spai.clj

  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Simulate install from checkout
        run: |
          # install.sh clones from GitHub which fails for private repos.
          # Simulate the install using the checked-out code instead.
          SHARE_DIR="$HOME/.local/share/spai"
          BIN_DIR="$HOME/.local/bin"
          mkdir -p "$SHARE_DIR" "$BIN_DIR"

          # Copy repo files to share dir
          cp -r ./* "$SHARE_DIR/"
          chmod +x "$SHARE_DIR"/*.clj 2>/dev/null || true

          # Create spai wrapper
          cat > "$BIN_DIR/spai" << WRAPPER
          #!/usr/bin/env bash
          export PATH="$SHARE_DIR/plugins:\$PATH"
          _d="\$PWD"
          while [ "\$_d" != "/" ]; do
            [ -d "\$_d/.spai/plugins" ] && export PATH="\$_d/.spai/plugins:\$PATH" && break
            _d="\$(dirname "\$_d")"
          done
          unset _d
          bb "$SHARE_DIR/spai.clj" "\$@"
          WRAPPER
          chmod +x "$BIN_DIR/spai"

          # Create spai-edit wrapper
          cat > "$BIN_DIR/spai-edit" << WRAPPER
          #!/usr/bin/env bash
          bb "$SHARE_DIR/spai-edit.clj" "\$@"
          WRAPPER
          chmod +x "$BIN_DIR/spai-edit"

      - name: Verify spai wrapper
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          spai help

      - name: Verify spai-edit wrapper
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          spai-edit help
